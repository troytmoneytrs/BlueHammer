name: Build FunnyApp (RedSun Exploit)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC (Visual Studio Build Tools)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build FunnyApp with MSBuild (Release x64)
        shell: cmd
        run: |
          msbuild FunnyApp.sln /p:Configuration=Release /p:Platform=x64 /p:BuildInParallel=true /m

      - name: Upload compiled FunnyApp.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunnyApp-Release-x64
          path: x64/Release/FunnyApp.exe
          if-no-files-found: error
